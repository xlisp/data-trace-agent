<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>data-trace-agent</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --panel-2: #1b212c;
    --border: #262d3a;
    --text: #e6e8ee;
    --muted: #8b95a8;
    --accent: #6ea8fe;
    --user: #2a3140;
    --agent: #1e2733;
    --tool: #2c2418;
    --tool-result: #1a2a1f;
    --error: #4a1f24;
    --code: #0c0f15;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  header { padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--panel); }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header .status { font-size: 12px; color: var(--muted); }
  header .status.ok { color: #6dd58c; }
  header .status.err { color: #ff8b8b; }

  main { display: grid; grid-template-columns: 1fr 1fr; height: calc(100% - 45px); }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; } }

  .pane { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--border); }
  .pane:last-child { border-right: 0; }
  .pane h2 { font-size: 12px; text-transform: uppercase; color: var(--muted); margin: 0;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--panel); letter-spacing: .8px; }
  .scroll { flex: 1; overflow: auto; padding: 12px; }

  .msg { margin-bottom: 10px; padding: 10px 12px; border-radius: 6px;
    border: 1px solid var(--border); white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { background: var(--user); }
  .msg.agent { background: var(--agent); }
  .msg.error { background: var(--error); }
  .msg .who { font-size: 11px; color: var(--muted); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: .8px; }
  .msg.thinking .dots::after { content: ""; animation: dots 1.2s steps(4, end) infinite; }
  @keyframes dots { 0%,20% { content: ""; } 40% { content: "."; } 60% { content: ".."; } 80%,100% { content: "..."; } }

  .tool { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .tool.call { background: var(--tool); }
  .tool.result { background: var(--tool-result); }
  .tool > summary { cursor: pointer; padding: 8px 10px; list-style: none;
    display: flex; gap: 8px; align-items: baseline; font-size: 12px; }
  .tool > summary::-webkit-details-marker { display: none; }
  .tool .tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; text-transform: uppercase;
    letter-spacing: .8px; color: #fff; }
  .tool.call .tag { background: #a6731c; }
  .tool.result .tag { background: #2f7a45; }
  .tool .name { font-weight: 600; color: var(--text); font-family: ui-monospace, Menlo, Consolas, monospace; }
  .tool .arg-key { color: var(--muted); margin-left: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; }
  .tool pre { margin: 0; padding: 10px 12px; background: var(--code); color: #d6e2f5;
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px;
    border-top: 1px solid var(--border); white-space: pre-wrap; word-wrap: break-word; max-height: 320px; overflow: auto; }

  form { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border); background: var(--panel); }
  textarea { flex: 1; resize: none; min-height: 38px; max-height: 160px;
    padding: 8px 10px; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; font: inherit; font-size: 14px; }
  textarea:focus { outline: none; border-color: var(--accent); }
  button { background: var(--accent); color: #0b1422; border: 0; padding: 0 16px;
    border-radius: 6px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .samples { padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--panel); }
  .samples .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .8px; }
  .sample-btn { display: block; width: 100%; text-align: left; background: transparent; color: var(--accent);
    border: 0; padding: 3px 0; font-size: 12.5px; cursor: pointer; }
  .sample-btn:hover { text-decoration: underline; }

  .empty { color: var(--muted); font-style: italic; text-align: center; padding: 24px; }
</style>
</head>
<body>
<header>
  <h1>data-trace-agent</h1>
  <span id="status" class="status">connecting…</span>
</header>
<main>
  <section class="pane">
    <h2>Conversation</h2>
    <div class="samples" id="samples">
      <div class="label">Sample questions</div>
    </div>
    <div class="scroll" id="chat"></div>
    <form id="form">
      <textarea id="input" placeholder="Ask the agent… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button id="send" type="submit">Send</button>
    </form>
  </section>
  <section class="pane">
    <h2>Tool calls</h2>
    <div class="scroll" id="tools">
      <div class="empty">Tool calls and their results will appear here as the agent works.</div>
    </div>
  </section>
</main>

<script>
const $chat = document.getElementById("chat");
const $tools = document.getElementById("tools");
const $form = document.getElementById("form");
const $input = document.getElementById("input");
const $send = document.getElementById("send");
const $status = document.getElementById("status");
const $samples = document.getElementById("samples");

let ws = null;
let busy = false;
let toolsHasContent = false;
let pendingAgent = null;  // the placeholder "thinking…" bubble

function setStatus(text, cls) {
  $status.textContent = text;
  $status.className = "status " + (cls || "");
}

function scrollToEnd(el) { el.scrollTop = el.scrollHeight; }

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  const who = document.createElement("div");
  who.className = "who";
  who.textContent = role === "user" ? "you" : role === "agent" ? "agent" : "error";
  const body = document.createElement("div");
  body.textContent = text;
  div.appendChild(who); div.appendChild(body);
  $chat.appendChild(div);
  scrollToEnd($chat);
  return { root: div, body };
}

function addThinking() {
  const div = document.createElement("div");
  div.className = "msg agent thinking";
  const who = document.createElement("div");
  who.className = "who";
  who.textContent = "agent";
  const body = document.createElement("div");
  body.innerHTML = '<span class="dots">working</span>';
  div.appendChild(who); div.appendChild(body);
  $chat.appendChild(div);
  scrollToEnd($chat);
  return { root: div, body };
}

function clearToolsEmpty() {
  if (!toolsHasContent) {
    $tools.innerHTML = "";
    toolsHasContent = true;
  }
}

function addToolCall(ev) {
  clearToolsEmpty();
  const det = document.createElement("details");
  det.className = "tool call";
  det.open = true;
  const sum = document.createElement("summary");
  sum.innerHTML = `<span class="tag">call</span><span class="name"></span>`;
  sum.querySelector(".name").textContent = ev.name || "?";
  // primary arg hint inline
  const args = ev.args || {};
  const primary = ["query","sql","command","file_path","directory_path","path","expression","table","table_name"]
    .find(k => k in args);
  if (primary) {
    const span = document.createElement("span");
    span.className = "arg-key";
    const v = String(args[primary]);
    span.textContent = primary + ": " + (v.length > 60 ? v.slice(0, 60) + "…" : v).replace(/\s+/g, " ");
    sum.appendChild(span);
  }
  const pre = document.createElement("pre");
  pre.textContent = ev.formatted || JSON.stringify(args, null, 2);
  det.appendChild(sum); det.appendChild(pre);
  $tools.appendChild(det);
  scrollToEnd($tools);
}

function addToolResult(ev) {
  clearToolsEmpty();
  const det = document.createElement("details");
  det.className = "tool result";
  const sum = document.createElement("summary");
  sum.innerHTML = `<span class="tag">result</span><span class="name"></span>`;
  sum.querySelector(".name").textContent = ev.name || "?";
  const hint = document.createElement("span");
  hint.className = "arg-key";
  const oneLine = (ev.preview || "").replace(/\s+/g, " ");
  hint.textContent = oneLine.length > 80 ? oneLine.slice(0, 80) + "…" : oneLine;
  sum.appendChild(hint);
  const pre = document.createElement("pre");
  pre.textContent = ev.content || "";
  det.appendChild(sum); det.appendChild(pre);
  $tools.appendChild(det);
  scrollToEnd($tools);
}

function setBusy(b) {
  busy = b;
  $send.disabled = b;
  $input.disabled = b;
}

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  setStatus("connecting…");
  ws.onopen = () => setStatus("connected", "ok");
  ws.onclose = () => { setStatus("disconnected — reconnecting…", "err"); setBusy(false); setTimeout(connect, 1500); };
  ws.onerror = () => setStatus("connection error", "err");
  ws.onmessage = (e) => {
    let ev;
    try { ev = JSON.parse(e.data); } catch { return; }
    switch (ev.type) {
      case "user_echo": break;
      case "tool_call": addToolCall(ev); break;
      case "tool_result": addToolResult(ev); break;
      case "ai_text": break;  // wait for "final" so we render the last AI text once
      case "final":
        if (pendingAgent) { pendingAgent.root.classList.remove("thinking"); pendingAgent.body.textContent = ev.content || "(no reply)"; pendingAgent = null; }
        else { addMsg("agent", ev.content || "(no reply)"); }
        setBusy(false);
        scrollToEnd($chat);
        break;
      case "error":
        if (pendingAgent) { pendingAgent.root.remove(); pendingAgent = null; }
        addMsg("error", ev.message || "unknown error");
        setBusy(false);
        break;
    }
  };
}

function send(text) {
  if (!text || busy || !ws || ws.readyState !== WebSocket.OPEN) return;
  addMsg("user", text);
  pendingAgent = addThinking();
  setBusy(true);
  ws.send(JSON.stringify({ text }));
}

$form.addEventListener("submit", (e) => {
  e.preventDefault();
  const text = $input.value.trim();
  if (!text) return;
  $input.value = "";
  send(text);
});
$input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    $form.requestSubmit();
  }
});

// Load sample questions from the server.
fetch("/api/samples").then(r => r.json()).then(({ questions }) => {
  for (const q of questions || []) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "sample-btn";
    b.textContent = "• " + q;
    b.onclick = () => { $input.value = q; $input.focus(); };
    $samples.appendChild(b);
  }
}).catch(() => {});

connect();
</script>
</body>
</html>
